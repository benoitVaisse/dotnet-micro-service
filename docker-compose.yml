services:
  catalog-db:
    image: postgres:17
    container_name: catalog-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data

volumes:
  catalog-db-data: